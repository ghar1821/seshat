<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seshat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 0.82rem;
      color: #666;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .turn { max-width: 680px; width: 100%; }
    .turn.user    { align-self: flex-end; }
    .turn.assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.55;
      word-break: break-word;
    }
    .user .bubble      { background: #0057d9; color: #fff; white-space: pre-wrap; }
    .assistant .bubble { background: #fff; border: 1px solid #ddd; color: #111; }

    /* Markdown element styles inside assistant bubbles */
    .assistant .bubble p { margin-bottom: 0.55em; }
    .assistant .bubble p:last-child { margin-bottom: 0; }
    .assistant .bubble h1, .assistant .bubble h2, .assistant .bubble h3 {
      font-weight: 600; margin: 0.8em 0 0.25em; line-height: 1.3;
    }
    .assistant .bubble h1 { font-size: 1.1em; }
    .assistant .bubble h2 { font-size: 1.0em; }
    .assistant .bubble h3 { font-size: 0.95em; }
    .assistant .bubble ul, .assistant .bubble ol { padding-left: 1.4em; margin: 0.4em 0; }
    .assistant .bubble li { margin-bottom: 0.15em; }
    .assistant .bubble code {
      background: #f0f0f0; border-radius: 3px;
      padding: 0.1em 0.35em; font-size: 0.88em;
      font-family: ui-monospace, monospace;
    }
    .assistant .bubble pre {
      background: #f0f0f0; border-radius: 6px;
      padding: 0.7em 1em; margin: 0.5em 0; overflow-x: auto;
    }
    .assistant .bubble pre code { background: none; padding: 0; font-size: 0.85em; }
    .assistant .bubble hr { border: none; border-top: 1px solid #ddd; margin: 0.5em 0; }
    .assistant .bubble a { color: #0057d9; }

    /* Native <details> for collapsible tool calls — no JS needed to toggle */
    details {
      margin-bottom: 6px;
      font-size: 0.78rem;
      color: #888;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 10px;
    }
    details summary { cursor: pointer; user-select: none; padding: 2px 0; }
    details pre {
      margin-top: 4px;
      padding: 4px 8px;
      background: #efefef;
      border-radius: 4px;
      font-size: 0.76rem;
      white-space: pre-wrap;
      color: #555;
    }

    .thinking {
      color: #aaa;
      font-size: 0.85rem;
      font-style: italic;
      padding: 6px 2px;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 9px 13px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    #input:focus { border-color: #0057d9; }

    button {
      padding: 9px 18px;
      background: #0057d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <header id="header">Seshat</header>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="Ask about your papers and notes..." autocomplete="off" autofocus>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const msgContainer = document.getElementById('messages');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');

    // ── Startup ──────────────────────────────────────────────────────────────

    // Show provider and vault path in the header
    fetch('/info')
      .then(r => r.json())
      .then(({ provider, vault }) => {
        document.getElementById('header').textContent =
          `Seshat  ·  ${provider}  ·  ${vault}`;
      });

    // Restore conversation history so a page refresh doesn't lose context
    fetch('/history')
      .then(r => r.json())
      .then(history => { history.forEach(renderTurn); scrollToBottom(); });

    // ── Markdown renderer ────────────────────────────────────────────────────

    // Converts the LLM's markdown output to safe HTML.
    // Handles: fenced code blocks, inline code, **bold**, *italic*, headers,
    // bullet/numbered lists, horizontal rules, [links](url), and paragraphs.
    // All user text is HTML-escaped before insertion to prevent XSS.
    function renderMarkdown(text) {
      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // Pull out fenced code blocks first so their content is not processed.
      const codeBlocks = [];
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, _lang, code) => {
        codeBlocks.push(`<pre><code>${esc(code.trimEnd())}</code></pre>`);
        return `\x02CB${codeBlocks.length - 1}\x03`;
      });

      // Inline formatting for a single line of non-code text.
      function inline(s) {
        const spans = [];
        // Extract inline code so its content is not bold/italic-processed.
        s = s.replace(/`([^`\n]+)`/g, (_, c) => {
          spans.push(`<code>${esc(c)}</code>`);
          return `\x02IC${spans.length - 1}\x03`;
        });
        s = esc(s);  // escape remaining text (\x02/\x03 pass through unharmed)
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
        // Links — only allow https?:// to block javascript: URIs.
        // After esc(), & in URLs becomes &amp;, which is correct for href values.
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]*)\)/g,
          (_, label, href) => `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`);
        s = s.replace(/\x02IC(\d+)\x03/g, (_, i) => spans[+i]);
        return s;
      }

      // Walk lines and build block-level HTML.
      const lines = text.split('\n');
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];

        // Fenced code block placeholder
        const cbm = line.match(/^\x02CB(\d+)\x03$/);
        if (cbm) { out.push(codeBlocks[+cbm[1]]); i++; continue; }

        // Heading
        const hm = line.match(/^(#{1,6})\s+(.*)/);
        if (hm) {
          out.push(`<h${Math.min(hm[1].length, 3)}>${inline(hm[2])}</h${Math.min(hm[1].length, 3)}>`);
          i++; continue;
        }

        // Horizontal rule
        if (/^-{3,}$/.test(line.trim())) { out.push('<hr>'); i++; continue; }

        // Unordered list
        if (/^[*\-]\s+\S/.test(line)) {
          const items = [];
          while (i < lines.length && /^[*\-]\s+/.test(lines[i]))
            items.push(`<li>${inline(lines[i++].replace(/^[*\-]\s+/, ''))}</li>`);
          out.push(`<ul>${items.join('')}</ul>`);
          continue;
        }

        // Ordered list
        if (/^\d+\.\s+\S/.test(line)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s+/.test(lines[i]))
            items.push(`<li>${inline(lines[i++].replace(/^\d+\.\s+/, ''))}</li>`);
          out.push(`<ol>${items.join('')}</ol>`);
          continue;
        }

        // Blank line
        if (line.trim() === '') { i++; continue; }

        // Paragraph: run of non-structural, non-blank lines
        const para = [];
        while (i < lines.length) {
          const l = lines[i];
          if (l.trim() === '') break;
          if (/^#{1,6}\s/.test(l) || /^[*\-]\s+\S/.test(l) || /^\d+\.\s+\S/.test(l)) break;
          if (/^-{3,}$/.test(l.trim()) || /^\x02CB\d+\x03$/.test(l)) break;
          para.push(inline(l));
          i++;
        }
        if (para.length) out.push(`<p>${para.join('<br>')}</p>`);
      }

      return out.join('');
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    // Render a completed turn (user or assistant) into the message list.
    // tool_calls is an array of [name, args] pairs; absent for user turns.
    function renderTurn(turn) {
      const div = document.createElement('div');
      div.className = `turn ${turn.role}`;

      if (turn.tool_calls && turn.tool_calls.length > 0) {
        const det = document.createElement('details');
        const sum = document.createElement('summary');
        sum.textContent = `${turn.tool_calls.length} tool call(s)`;
        det.appendChild(sum);
        for (const [name, args] of turn.tool_calls) {
          const pre = document.createElement('pre');
          pre.textContent = `→ ${name}(${args || ''})`;
          det.appendChild(pre);
        }
        div.appendChild(det);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (turn.role === 'assistant') {
        bubble.innerHTML = renderMarkdown(turn.content);
      } else {
        bubble.textContent = turn.content;
      }
      div.appendChild(bubble);

      msgContainer.appendChild(div);
    }

    function scrollToBottom() {
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // ── Send ─────────────────────────────────────────────────────────────────

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      // User message appears immediately
      renderTurn({ role: 'user', content: text });
      scrollToBottom();

      // Build the assistant placeholder — filled in as SSE events arrive
      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'turn assistant';

      // Live tool-call box (open while the agent is working)
      const toolDetails = document.createElement('details');
      toolDetails.open = true;
      const toolSummary = document.createElement('summary');
      toolSummary.textContent = 'Working...';
      toolDetails.appendChild(toolSummary);

      const thinkingEl = document.createElement('div');
      thinkingEl.className = 'thinking';
      thinkingEl.textContent = 'Working...';
      assistantDiv.appendChild(thinkingEl);
      msgContainer.appendChild(assistantDiv);
      scrollToBottom();

      let toolCallCount = 0;

      // POST to /chat; read the response body as a stream of SSE lines.
      // (EventSource only supports GET, so we use fetch + ReadableStream instead.)
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep any incomplete line for the next chunk

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === 'tool') {
            // Add the tool call to the live details box
            if (toolCallCount === 0) {
              assistantDiv.insertBefore(toolDetails, thinkingEl);
            }
            toolCallCount++;
            const pre = document.createElement('pre');
            pre.textContent = `→ ${event.name}(${event.args || ''})`;
            toolDetails.appendChild(pre);
            toolSummary.textContent = `${toolCallCount} tool call(s)`;
            scrollToBottom();

          } else if (event.type === 'reply') {
            // Replace the placeholder with the finished response
            thinkingEl.remove();
            if (toolCallCount > 0) {
              toolDetails.open = false; // collapse when the reply arrives
            }
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = renderMarkdown(event.content);
            assistantDiv.appendChild(bubble);
            scrollToBottom();
          }
        }
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
