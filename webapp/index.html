<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seshat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 0.82rem;
      color: #666;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .turn { max-width: 680px; width: 100%; }
    .turn.user    { align-self: flex-end; }
    .turn.assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble      { background: #0057d9; color: #fff; }
    .assistant .bubble { background: #fff; border: 1px solid #ddd; color: #111; }

    /* Native <details> for collapsible tool calls — no JS needed to toggle */
    details {
      margin-bottom: 6px;
      font-size: 0.78rem;
      color: #888;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 10px;
    }
    details summary { cursor: pointer; user-select: none; padding: 2px 0; }
    details pre {
      margin-top: 4px;
      padding: 4px 8px;
      background: #efefef;
      border-radius: 4px;
      font-size: 0.76rem;
      white-space: pre-wrap;
      color: #555;
    }

    .thinking {
      color: #aaa;
      font-size: 0.85rem;
      font-style: italic;
      padding: 6px 2px;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 9px 13px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    #input:focus { border-color: #0057d9; }

    button {
      padding: 9px 18px;
      background: #0057d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <header id="header">Seshat</header>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="Ask about your papers and notes..." autocomplete="off" autofocus>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const msgContainer = document.getElementById('messages');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');

    // ── Startup ──────────────────────────────────────────────────────────────

    // Show provider and vault path in the header
    fetch('/info')
      .then(r => r.json())
      .then(({ provider, vault }) => {
        document.getElementById('header').textContent =
          `Seshat  ·  ${provider}  ·  ${vault}`;
      });

    // Restore conversation history so a page refresh doesn't lose context
    fetch('/history')
      .then(r => r.json())
      .then(history => { history.forEach(renderTurn); scrollToBottom(); });

    // ── Rendering ────────────────────────────────────────────────────────────

    // Render a completed turn (user or assistant) into the message list.
    // tool_calls is an array of [name, args] pairs; absent for user turns.
    function renderTurn(turn) {
      const div = document.createElement('div');
      div.className = `turn ${turn.role}`;

      if (turn.tool_calls && turn.tool_calls.length > 0) {
        const det = document.createElement('details');
        const sum = document.createElement('summary');
        sum.textContent = `${turn.tool_calls.length} tool call(s)`;
        det.appendChild(sum);
        for (const [name, args] of turn.tool_calls) {
          const pre = document.createElement('pre');
          pre.textContent = `→ ${name}(${args || ''})`;
          det.appendChild(pre);
        }
        div.appendChild(det);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = turn.content;
      div.appendChild(bubble);

      msgContainer.appendChild(div);
    }

    function scrollToBottom() {
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // ── Send ─────────────────────────────────────────────────────────────────

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      // User message appears immediately
      renderTurn({ role: 'user', content: text });
      scrollToBottom();

      // Build the assistant placeholder — filled in as SSE events arrive
      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'turn assistant';

      // Live tool-call box (open while the agent is working)
      const toolDetails = document.createElement('details');
      toolDetails.open = true;
      const toolSummary = document.createElement('summary');
      toolSummary.textContent = 'Working...';
      toolDetails.appendChild(toolSummary);

      const thinkingEl = document.createElement('div');
      thinkingEl.className = 'thinking';
      thinkingEl.textContent = 'Working...';
      assistantDiv.appendChild(thinkingEl);
      msgContainer.appendChild(assistantDiv);
      scrollToBottom();

      let toolCallCount = 0;

      // POST to /chat; read the response body as a stream of SSE lines.
      // (EventSource only supports GET, so we use fetch + ReadableStream instead.)
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep any incomplete line for the next chunk

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === 'tool') {
            // Add the tool call to the live details box
            if (toolCallCount === 0) {
              assistantDiv.insertBefore(toolDetails, thinkingEl);
            }
            toolCallCount++;
            const pre = document.createElement('pre');
            pre.textContent = `→ ${event.name}(${event.args || ''})`;
            toolDetails.appendChild(pre);
            toolSummary.textContent = `${toolCallCount} tool call(s)`;
            scrollToBottom();

          } else if (event.type === 'reply') {
            // Replace the placeholder with the finished response
            thinkingEl.remove();
            if (toolCallCount > 0) {
              toolDetails.open = false; // collapse when the reply arrives
            }
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = event.content;
            assistantDiv.appendChild(bubble);
            scrollToBottom();
          }
        }
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
